aid: bizapi
url: >-
  https://raw.githubusercontent.com/api-evangelist/bizapi/refs/heads/main/apis.yml
name: BizAPI
description: >-
  BizAPI is a real-time Business Intelligence API from the NAICS Association that
  provides firmographic data on over 220 million US and international business
  entities. It enables businesses to enrich CRM records, power customer acquisition
  workflows, and append NAICS codes, SIC codes, DUNS numbers, company details,
  sales volume, employee counts, and corporate hierarchy information to any business
  record via a simple REST API.
