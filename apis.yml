apis:
  - aid: bizapi:bizapi
    name: BizAPI Business Intelligence API
    description: >-
      Real-time REST API from the NAICS Association that returns firmographic data
      on over 220 million US and international business locations. Provides DUNS
      numbers, SIC codes, NAICS codes, company details, contact information, sales
      volume, employee counts, and corporate hierarchy. Supports both live production
      and test (sandbox) endpoints. Rate limited to 3 requests per rolling second.
      Authentication via HTTP Basic with credentials provided at account activation.
    humanURL: https://www.naics.com/business-intelligence-api/
    tags:
      - Business Intelligence
      - Company Data
      - Firmographic Data
      - NAICS
      - SIC
