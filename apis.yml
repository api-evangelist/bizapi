  - type: Features
    data:
      - name: Real-Time Firmographic Data
        description: >-
          Returns live firmographic data on over 220 million US and international
          business entities in real time.
      - name: NAICS and SIC Classification
        description: >-
          Provides 6-digit NAICS codes and 4- and 8-digit SIC codes for industry
          classification of business entities.
      - name: DUNS Number Lookup
        description: >-
          Returns D&B DUNS numbers enabling universal business entity identification
          and credit data linkage.
      - name: Corporate Hierarchy
        description: >-
          Exposes parent, domestic ultimate, and global ultimate company relationships
          with DUNS and name fields.
      - name: CRM Enrichment
        description: >-
          Designed to integrate with CRMs, SFAs, and internal systems to append
          firmographic data to business records.
      - name: Sandbox Test Endpoint
        description: >-
          Includes a /cosearchtest endpoint that returns fake data without consuming
          API credits for development and testing.
  - type: UseCases
    data:
      - name: CRM Data Enrichment
        description: >-
          Append NAICS codes, DUNS numbers, employee counts, and sales volume to
          company records in CRM and SFA systems.
      - name: Customer Acquisition
        description: >-
          Identify and qualify business prospects by searching firmographic data
          to match against target industry and size criteria.
      - name: Market Research
        description: >-
          Analyze business landscapes by querying firmographic data across industries,
          geographies, and corporate hierarchies.
      - name: Lead Scoring
        description: >-
          Enrich inbound leads with firmographic attributes to power scoring models
          that prioritize high-value accounts.
      - name: Compliance Verification
        description: >-
          Verify business identity, location, and corporate hierarchy for compliance
          and due diligence workflows.
  - type: Integrations
    data:
      - name: Salesforce
        description: >-
          Integrate BizAPI with Salesforce CRM to auto-append firmographic data
          to account and lead records.
      - name: HubSpot
        description: >-
          Enrich HubSpot company records with NAICS, SIC, DUNS, and financial
          indicators via BizAPI.
      - name: Marketo
        description: >-
          Append industry classification and company size data to Marketo lead
          records for segmentation and scoring.
      - name: Microsoft Dynamics
        description: >-
          Connect BizAPI to Dynamics 365 to surface firmographic context on accounts
          and contacts.
